name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, 'task/**']

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    runs-on: ubuntu-latest
    name: PHP ${{ matrix.php }} / Laravel 13
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, openssl, pdo, pdo_sqlite, sqlite3, tokenizer, xml, ctype, json, intl
          coverage: none
          tools: composer:v2

      - name: Composer cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('**/composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Validate composer.json
        if: hashFiles('composer.json') != ''
        run: composer validate --strict --no-check-publish

      - name: Install dependencies
        if: hashFiles('composer.json') != ''
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run Pint (style check)
        if: hashFiles('composer.json') != ''
        run: composer format:test

      - name: Run PHPStan
        if: hashFiles('composer.json') != ''
        run: composer analyse

      - name: Run PHPUnit suites
        if: hashFiles('composer.json') != ''
        run: composer test

      - name: PHP gate skipped (no composer.json yet)
        if: hashFiles('composer.json') == ''
        run: echo "composer.json not present yet — Macro 2 will introduce it."

  frontend:
    runs-on: ubuntu-latest
    name: Frontend (Node 20)
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install npm deps
        if: hashFiles('package.json') != ''
        run: npm ci

      - name: Lint
        if: hashFiles('package.json') != ''
        run: npm run lint --if-present

      - name: Build
        if: hashFiles('package.json') != ''
        run: npm run build --if-present

      - name: Frontend gate skipped (no package.json yet)
        if: hashFiles('package.json') == ''
        run: echo "package.json not present yet — Macro 2 will introduce it."

  e2e:
    runs-on: ubuntu-latest
    name: E2E ${{ matrix.browser }} (Playwright)
    needs: [php, frontend]
    strategy:
      fail-fast: false
      matrix:
        browser: ['chromium', 'firefox', 'webkit']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        if: hashFiles('composer.json') != ''
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, openssl, pdo, pdo_sqlite, sqlite3, tokenizer, xml, ctype, json, intl
          coverage: none
          tools: composer:v2

      - name: Composer install
        if: hashFiles('composer.json') != ''
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: npm ci
        if: hashFiles('package.json') != ''
        run: npm ci

      - name: Install Playwright browsers
        if: hashFiles('package.json') != ''
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright (${{ matrix.browser }})
        if: hashFiles('playwright.config.js') != '' || hashFiles('playwright.config.ts') != ''
        env:
          FLOW_ADMIN_ADAPTER: array
        run: npm run test:e2e -- --project=${{ matrix.browser }}

      - name: Upload Playwright report
        if: failure() && (hashFiles('playwright.config.js') != '' || hashFiles('playwright.config.ts') != '')
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 14

      - name: E2E gate skipped (no playwright config yet)
        if: hashFiles('playwright.config.js') == '' && hashFiles('playwright.config.ts') == ''
        run: echo "playwright.config not present yet — Macro 2 will introduce it."
