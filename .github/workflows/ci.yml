name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, 'task/**']

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    runs-on: ubuntu-latest
    name: PHP ${{ matrix.php }} / Laravel 13
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
    defaults:
      run:
        working-directory: laravel-flow-admin

    steps:
      - name: Checkout laravel-flow-admin
        uses: actions/checkout@v7
        with:
          path: laravel-flow-admin

      # padosoft/laravel-flow (^2.0) and padosoft/laravel-flow-ai (^1.0, dev)
      # are resolved as normal tagged dependencies from Packagist — no sibling
      # checkout of core/ai is needed; the composer step below fetches them.

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, openssl, pdo, pdo_sqlite, sqlite3, tokenizer, xml, ctype, json, intl
          coverage: none
          tools: composer:v2

      - name: Composer cache
        uses: actions/cache@v6
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('**/composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Validate composer.json
        if: hashFiles('laravel-flow-admin/composer.json') != ''
        run: composer validate --strict --no-check-publish

      - name: Install dependencies (lockfile-aware)
        if: hashFiles('laravel-flow-admin/composer.json') != ''
        run: |
          if [ -f composer.lock ]; then
            composer install --prefer-dist --no-interaction --no-progress
          else
            composer update --prefer-dist --no-interaction --no-progress
          fi

      - name: Run Pint (style check)
        if: hashFiles('laravel-flow-admin/composer.json') != '' && matrix.php == '8.4'
        run: composer format:test

      - name: Run PHPStan
        if: hashFiles('laravel-flow-admin/composer.json') != ''
        run: composer analyse

      - name: Run PHPUnit suites
        if: hashFiles('laravel-flow-admin/composer.json') != ''
        run: composer test

      - name: PHP gate skipped (no composer.json yet)
        if: hashFiles('laravel-flow-admin/composer.json') == ''
        run: echo "composer.json not present yet — Macro 2 will introduce it."

  frontend:
    runs-on: ubuntu-latest
    name: Frontend (Node 20)
    steps:
      - uses: actions/checkout@v7

      - name: Detect package manifest
        id: pkg
        run: |
          if [ -f package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -f package-lock.json ]; then
            echo "lockfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "lockfile=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node (with npm cache)
        if: steps.pkg.outputs.present == 'true' && steps.pkg.outputs.lockfile == 'true'
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Node (no cache, no lockfile yet)
        if: steps.pkg.outputs.present == 'true' && steps.pkg.outputs.lockfile != 'true'
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Install npm deps
        if: steps.pkg.outputs.present == 'true'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Lint
        if: steps.pkg.outputs.present == 'true'
        run: npm run lint --if-present

      - name: Build
        if: steps.pkg.outputs.present == 'true'
        run: npm run build --if-present

      # Built once here, shared with all 3 e2e browser-matrix legs via
      # actions/download-artifact — each matrix leg is a fully separate
      # runner/checkout, so without this every leg would run its own
      # `npm run build` (same Vite input, same output, 3x the compute
      # for zero difference in result).
      - name: Upload built assets for e2e reuse
        if: steps.pkg.outputs.present == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: flow-admin-built-assets
          path: public/vendor/flow-admin/
          retention-days: 1
          # Vite's manifest lives at the hidden .vite/manifest.json — the
          # action's default (include-hidden-files: false) silently drops
          # it, so the downloaded copy has the built JS/CSS but no
          # manifest, and AbstractManifestAssetController 404s everything
          # (confirmed in CI: "4 files uploaded" instead of the real 5).
          include-hidden-files: true

      - name: Frontend gate skipped (no package.json yet)
        if: steps.pkg.outputs.present != 'true'
        run: echo "package.json not present yet — Macro 2 will introduce it."

  e2e:
    runs-on: ubuntu-latest
    name: E2E ${{ matrix.browser }} (Playwright)
    needs: [php, frontend]
    strategy:
      fail-fast: false
      matrix:
        browser: ['chromium', 'firefox', 'webkit']
    defaults:
      run:
        working-directory: laravel-flow-admin

    steps:
      - name: Checkout laravel-flow-admin
        uses: actions/checkout@v7
        with:
          path: laravel-flow-admin

      # core (^2.0) and ai (^1.0) are resolved from Packagist — no sibling
      # checkout needed (see the php job for the same note).

      - name: Detect manifests
        id: pkg
        run: |
          [ -f composer.json ] && echo "composer=true" >> "$GITHUB_OUTPUT" || echo "composer=false" >> "$GITHUB_OUTPUT"
          [ -f package.json ]  && echo "node=true"     >> "$GITHUB_OUTPUT" || echo "node=false"     >> "$GITHUB_OUTPUT"
          [ -f package-lock.json ] && echo "lockfile=true" >> "$GITHUB_OUTPUT" || echo "lockfile=false" >> "$GITHUB_OUTPUT"
          if [ -f playwright.config.js ] || [ -f playwright.config.ts ]; then
            echo "pw=true" >> "$GITHUB_OUTPUT"
          else
            echo "pw=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup PHP 8.3
        if: steps.pkg.outputs.composer == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, openssl, pdo, pdo_sqlite, sqlite3, tokenizer, xml, ctype, json, intl
          coverage: none
          tools: composer:v2

      - name: Composer install (lockfile-aware)
        if: steps.pkg.outputs.composer == 'true'
        run: |
          if [ -f composer.lock ]; then
            composer install --prefer-dist --no-interaction --no-progress
          else
            composer update --prefer-dist --no-interaction --no-progress
          fi

      - name: Setup Node (with npm cache)
        if: steps.pkg.outputs.node == 'true' && steps.pkg.outputs.lockfile == 'true'
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: laravel-flow-admin/package-lock.json

      - name: Setup Node (no cache, no lockfile yet)
        if: steps.pkg.outputs.node == 'true' && steps.pkg.outputs.lockfile != 'true'
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Install npm deps
        if: steps.pkg.outputs.node == 'true'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Fail if playwright.config exists without package.json
        if: steps.pkg.outputs.pw == 'true' && steps.pkg.outputs.node != 'true'
        run: |
          echo "::error::playwright.config exists but package.json is missing — add package.json before enabling E2E tests."
          exit 1

      - name: Install Playwright browsers
        if: steps.pkg.outputs.pw == 'true' && steps.pkg.outputs.node == 'true'
        run: npx playwright install --with-deps ${{ matrix.browser }}

      # Reuse the SAME build the `frontend` job already produced and
      # uploaded, instead of every matrix leg (chromium/firefox/webkit —
      # 3 fully separate runners) rebuilding the identical output. Falls
      # back to a real local build if the artifact is missing (e.g. the
      # `frontend` job's build step was itself skipped) so this job never
      # silently runs against a stale/absent bundle.
      - name: Download built assets from the frontend job
        if: steps.pkg.outputs.pw == 'true' && steps.pkg.outputs.node == 'true'
        id: download-assets
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: flow-admin-built-assets
          # `download-artifact` is a `uses:` step — `defaults.run.working-directory`
          # only applies to `run:` (shell) steps, so this must be prefixed
          # with the checkout subdirectory explicitly (same reason the
          # Playwright-report upload below is `laravel-flow-admin/playwright-report/`).
          path: laravel-flow-admin/public/vendor/flow-admin/

      - name: Build assets (fallback — artifact download failed or was skipped)
        if: steps.pkg.outputs.pw == 'true' && steps.pkg.outputs.node == 'true' && steps.download-assets.outcome != 'success'
        run: npm run build

      - name: Run Playwright (${{ matrix.browser }})
        if: steps.pkg.outputs.pw == 'true' && steps.pkg.outputs.node == 'true'
        env:
          FLOW_ADMIN_MIDDLEWARE: web
          FLOW_ADMIN_ADAPTER: array
        run: npx playwright test --project=${{ matrix.browser }}

      # The served testbench app's exceptions (e.g. a save-as-draft failure
      # caught in StudioController::storeDraft and logged, not returned) land
      # in Laravel's log, NOT in the Playwright/webServer stdout — so a server
      # 500 behind an E2E failure is otherwise invisible in CI. Surface it.
      - name: Dump testbench application log on failure
        if: failure() && steps.pkg.outputs.pw == 'true' && steps.pkg.outputs.node == 'true'
        run: |
          LOG="vendor/orchestra/testbench-core/laravel/storage/logs/laravel.log"
          if [ -f "$LOG" ]; then
            echo "===== $LOG (tail) ====="
            tail -n 200 "$LOG"
          else
            echo "No testbench application log at $LOG."
          fi

      - name: Upload Playwright report
        if: failure() && steps.pkg.outputs.pw == 'true' && steps.pkg.outputs.node == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.browser }}
          path: laravel-flow-admin/playwright-report/
          retention-days: 14

      - name: E2E gate skipped (no playwright config yet)
        if: steps.pkg.outputs.pw != 'true'
        run: echo "playwright.config not present yet — Macro 2/3 will introduce it."

      - name: E2E gate diagnostic (playwright config without Node manifest)
        if: steps.pkg.outputs.pw == 'true' && steps.pkg.outputs.node != 'true'
        run: echo "NOTE — the explicit fail step above already exited 1; this diagnostic is unreachable but kept as a documentation anchor."
